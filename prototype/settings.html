<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - UNIFLOW</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fffdf7; color: #18181b; }
        h1, h2, h3, h4, h5, h6 { font-family: 'Space Grotesk', sans-serif; }
        .brutal-shadow { box-shadow: 4px 4px 0px 0px #000000; }
        .brutal-shadow-sm { box-shadow: 2px 2px 0px 0px #000000; }
        .brutal-hover:hover { transform: translate(2px, 2px); box-shadow: 2px 2px 0px 0px #000000; cursor: pointer; }
        
        .toggle-switch input:checked + div { background-color: #86efac; }
        .toggle-switch input:checked + div > div { transform: translateX(1.5rem); }
    </style>
</head>
<body class="antialiased selection:bg-yellow-200 selection:text-black flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-64 border-r-2 border-black bg-white flex flex-col justify-between hidden md:block shrink-0">
        <div>
            <div class="h-20 border-b-2 border-black flex items-center px-6">
                <a href="design.html" class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-[#86efac] rounded border-2 border-black flex items-center justify-center brutal-shadow-sm">
                        <i data-lucide="activity" class="w-5 h-5"></i>
                    </div>
                    <span class="text-xl font-bold tracking-tight">UNIFLOW</span>
                </a>
            </div>
            <nav class="p-4 flex flex-col gap-2">
                <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-xl border-2 border-transparent hover:border-black font-semibold text-zinc-600 hover:text-black hover:bg-zinc-50 transition-colors">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard
                </a>
                <a href="habits.html" class="flex items-center gap-3 px-4 py-3 rounded-xl border-2 border-transparent hover:border-black font-semibold text-zinc-600 hover:text-black hover:bg-zinc-50 transition-colors">
                    <i data-lucide="list-todo" class="w-5 h-5"></i> All Habits
                </a>
                <a href="coach.html" class="flex items-center gap-3 px-4 py-3 rounded-xl border-2 border-transparent hover:border-black font-semibold text-zinc-600 hover:text-black hover:bg-zinc-50 transition-colors">
                    <i data-lucide="bot" class="w-5 h-5 text-indigo-500"></i> AI Coach
                </a>
                <a href="analytics.html" class="flex items-center gap-3 px-4 py-3 rounded-xl border-2 border-transparent hover:border-black font-semibold text-zinc-600 hover:text-black hover:bg-zinc-50 transition-colors">
                    <i data-lucide="pie-chart" class="w-5 h-5"></i> Analytics
                </a>
            </nav>
        </div>
        
        <div class="p-4 border-t-2 border-black">
            <a href="settings.html" class="flex items-center gap-3 px-4 py-3 bg-zinc-100 rounded-xl border-2 border-black font-bold text-black hover:bg-zinc-200 transition-colors brutal-shadow-sm">
                <i data-lucide="settings" class="w-5 h-5"></i> Settings
            </a>
            <div class="mt-4 flex items-center gap-3 px-4">
                <div class="w-10 h-10 rounded-full border-2 border-black bg-gradient-to-br from-pink-300 to-purple-400"></div>
                <div>
                    <div class="text-sm font-bold">Gaurav</div>
                    <a href="auth.html" class="text-xs text-zinc-500 font-medium cursor-pointer hover:underline">Log out</a>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden bg-[#fffdf7]">
        <!-- Mobile Topbar -->
        <header class="h-20 border-b-2 border-black px-6 flex items-center justify-between md:hidden bg-white shrink-0">
            <a href="design.html" class="flex items-center gap-2">
                <div class="w-8 h-8 bg-[#86efac] rounded border-2 border-black flex items-center justify-center">
                    <i data-lucide="activity" class="w-5 h-5"></i>
                </div>
            </a>
            <button class="w-10 h-10 bg-white border-2 border-black rounded flex items-center justify-center brutal-shadow-sm">
                <i data-lucide="menu" class="w-5 h-5"></i>
            </button>
        </header>

        <!-- Dynamic Area -->
        <div class="flex-1 overflow-y-auto p-6 md:p-10 max-w-4xl">
            <h1 class="text-4xl md:text-5xl font-medium mb-10">Settings</h1>

            <div class="space-y-8">
                <!-- Profile Section -->
                <section class="bg-white border-2 border-black p-6 rounded-2xl brutal-shadow-sm">
                    <h2 class="text-2xl font-bold mb-6">Profile</h2>
                    <div class="flex items-center gap-6 mb-6">
                        <div class="w-24 h-24 rounded-full border-2 border-black bg-gradient-to-br from-pink-300 to-purple-400 flex flex-col items-center justify-center cursor-pointer hover:opacity-80 transition-opacity">
                            <i data-lucide="camera" class="w-6 h-6 text-white absolute mix-blend-difference"></i>
                        </div>
                        <div>
                            <button class="bg-black text-white px-4 py-2 border-2 border-black rounded-lg font-bold brutal-shadow-sm brutal-hover text-sm mb-2">Upload Photo</button>
                            <p class="text-xs font-bold text-zinc-500">JPG, GIF or PNG. 1MB max.</p>
                        </div>
                    </div>
                    <div class="space-y-4">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-bold mb-2">First Name</label>
                                <input type="text" value="Gaurav" class="w-full border-2 border-black px-3 py-2 rounded-lg focus:outline-none focus:ring-4 focus:ring-yellow-200 font-medium">
                            </div>
                            <div>
                                <label class="block text-sm font-bold mb-2">Last Name</label>
                                <input type="text" value="Kumar" class="w-full border-2 border-black px-3 py-2 rounded-lg focus:outline-none focus:ring-4 focus:ring-yellow-200 font-medium">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-2">Email</label>
                            <input type="email" value="gaurav@example.com" class="w-full border-2 border-black px-3 py-2 rounded-lg focus:outline-none focus:ring-4 focus:ring-yellow-200 font-medium">
                        </div>
                    </div>
                </section>

                <!-- AI Preferences -->
                <section class="bg-[#bfdbfe] border-2 border-black p-6 rounded-2xl brutal-shadow-sm">
                    <h2 class="text-2xl font-bold mb-2 flex items-center gap-2">
                        <i data-lucide="bot" class="w-6 h-6 text-blue-600"></i> AI Coach Settings
                    </h2>
                    <p class="text-zinc-600 font-medium mb-6">How should Aura motivate you?</p>
                    
                    <div class="space-y-4 bg-white/50 p-4 rounded-xl border border-black/10">
                        <label class="flex items-center justify-between cursor-pointer">
                            <div>
                                <div class="font-bold">Roast Mode</div>
                                <div class="text-xs text-zinc-500 font-medium">Coach uses tough love and roasts you if you skip habits.</div>
                            </div>
                            <label class="toggle-switch relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" class="sr-only" checked>
                                <div class="w-11 h-6 bg-zinc-300 border-2 border-black rounded-full transition-colors duration-200 ease-in-out">
                                    <div class="w-4 h-4 bg-white border-2 border-black rounded-full transform translate-x-0.5 mt-0.5 transition-transform duration-200 ease-in-out shadow-[1px_1px_0px_#000]"></div>
                                </div>
                            </label>
                        </label>
                    </div>

                    <div class="space-y-4 bg-white/50 p-4 rounded-xl border border-black/10 mt-4">
                        <label class="flex items-center justify-between cursor-pointer">
                            <div>
                                <div class="font-bold">WhatsApp Reminders</div>
                                <div class="text-xs text-zinc-500 font-medium">Receive daily motivation via WhatsApp.</div>
                            </div>
                            <label class="toggle-switch relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" class="sr-only">
                                <div class="w-11 h-6 bg-zinc-300 border-2 border-black rounded-full transition-colors duration-200 ease-in-out">
                                    <div class="w-4 h-4 bg-white border-2 border-black rounded-full transform translate-x-0.5 mt-0.5 transition-transform duration-200 ease-in-out shadow-[1px_1px_0px_#000]"></div>
                                </div>
                            </label>
                        </label>
                    </div>
                </section>

                <!-- Danger Zone -->
                <section class="bg-red-50 border-2 border-red-500 p-6 rounded-2xl brutal-shadow-sm">
                    <h2 class="text-2xl font-bold mb-2 text-red-600">Danger Zone</h2>
                    <p class="text-red-500 font-medium mb-4">Resetting your account will erase all streaks.</p>
                    <button class="bg-red-500 text-white px-4 py-2 border-2 border-black rounded-lg font-bold brutal-shadow-sm brutal-hover">Delete Account</button>
                </section>
                
                <div class="flex justify-end pt-4">
                     <button class="bg-[#fde047] text-black px-8 py-3 border-2 border-black rounded-xl font-bold text-lg brutal-shadow brutal-hover">Save Changes</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
